<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hook'Em Up Towing Demo Promo</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #111;
      font-family: Arial, Helvetica, sans-serif;
    }

    .card {
      position: relative;
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      color: #f8f3df;
      background:
        linear-gradient(135deg, rgba(0, 0, 0, .92), rgba(14, 14, 10, .92)),
        repeating-linear-gradient(45deg, rgba(255, 207, 48, .08) 0 12px, rgba(0, 0, 0, .08) 12px 24px);
      border: 18px solid #f3c72c;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 54px;
      border: 4px solid rgba(243, 199, 44, .62);
      pointer-events: none;
    }

    .hazard {
      position: absolute;
      inset: 0 auto auto 0;
      width: 100%;
      height: 86px;
      background: repeating-linear-gradient(135deg, #f3c72c 0 34px, #10100e 34px 68px);
      border-bottom: 10px solid #10100e;
    }

    .content {
      position: relative;
      z-index: 1;
      height: 100%;
      padding: 126px 78px 72px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 34px;
    }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 34px;
    }

    .logo-lockup {
      display: flex;
      align-items: center;
      gap: 22px;
    }

    .logo {
      width: 172px;
      height: 172px;
      display: grid;
      place-items: center;
      border: 5px solid #f3c72c;
      background: #050505;
      box-shadow: 14px 14px 0 rgba(243, 199, 44, .18);
    }

    .logo img {
      width: 142px;
      height: 142px;
      object-fit: contain;
    }

    .brand small,
    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 38px;
      padding: 0 14px;
      border: 3px solid #f3c72c;
      background: #050505;
      color: #f3c72c;
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 1.6px;
      text-transform: uppercase;
    }

    .brand strong {
      display: block;
      margin-top: 12px;
      max-width: 500px;
      color: #fff;
      font-size: 50px;
      line-height: .94;
      letter-spacing: -1px;
      text-transform: uppercase;
    }

    .main {
      display: grid;
      align-content: center;
      gap: 26px;
    }

    h1 {
      margin: 0;
      color: #fff;
      font-size: 96px;
      line-height: .88;
      letter-spacing: -4px;
      text-transform: uppercase;
    }

    h1 span {
      color: #f3c72c;
    }

    .lead {
      max-width: 800px;
      margin: 0;
      color: #f8f3df;
      font-size: 34px;
      line-height: 1.15;
      font-weight: 800;
    }

    .service-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-top: 12px;
    }

    .service {
      min-height: 108px;
      display: grid;
      align-content: center;
      gap: 8px;
      padding: 18px;
      border: 4px solid #f3c72c;
      background: #0a0a08;
      box-shadow: 8px 8px 0 rgba(243, 199, 44, .18);
    }

    .service strong {
      color: #fff;
      font-size: 24px;
      text-transform: uppercase;
    }

    .service span {
      color: #f3c72c;
      font-size: 18px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .bottom {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: end;
      gap: 28px;
    }

    .link-box {
      padding: 20px 24px;
      border: 4px solid #fff;
      background: #f3c72c;
      color: #080806;
      box-shadow: 10px 10px 0 #000;
    }

    .link-box small {
      display: block;
      margin-bottom: 6px;
      font-size: 19px;
      font-weight: 900;
      letter-spacing: 1.4px;
      text-transform: uppercase;
    }

    .link-box strong {
      display: block;
      font-size: 31px;
      line-height: 1;
      letter-spacing: -1px;
    }

    .cta {
      display: grid;
      place-items: center;
      width: 222px;
      height: 106px;
      border: 5px solid #f3c72c;
      background: #050505;
      color: #fff;
      font-size: 28px;
      font-weight: 950;
      text-align: center;
      text-transform: uppercase;
      box-shadow: 10px 10px 0 rgba(243, 199, 44, .22);
    }
  </style>
</head>
<body>
  <main class="card" aria-label="Hook'Em Up Towing demo website promo">
    <div class="hazard"></div>
    <section class="content">
      <div class="top">
        <div class="logo-lockup">
          <div class="logo">
            <img src="../../demos/assets/hookemup-towing-logo.png" alt="Hook'Em Up Towing logo">
          </div>
          <div class="brand">
            <strong>Hook'Em Up Towing</strong>
          </div>
        </div>
        <div class="tag">24/7 Ready</div>
      </div>

      <div class="main">
        <h1>Roadside Help<br><span>Made Easy</span></h1>
        <p class="lead">A mobile-first site built for fast calls, service requests, and customers who need help now.</p>
        <div class="service-row">
          <div class="service"><strong>Towing</strong><span>Local dispatch</span></div>
          <div class="service"><strong>Jump Starts</strong><span>Fast response</span></div>
          <div class="service"><strong>Lockouts</strong><span>Roadside support</span></div>
        </div>
      </div>

      <div class="bottom">
        <div class="link-box">
          <small>View the website</small>
          <strong>ownyourweb.xyz/demos/towing-roadside.html</strong>
        </div>
        <div class="cta">Tap<br>to View</div>
      </div>
    </section>
  </main>
</body>
</html>
