<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OWNYOURWEB Quote</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0d0d0d;
      font-family: Arial, Helvetica, sans-serif;
    }

    .card {
      position: relative;
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      border: 18px solid #0d0d0d;
      background:
        linear-gradient(90deg, rgba(13,13,13,.045) 1px, transparent 1px),
        linear-gradient(0deg, rgba(13,13,13,.045) 1px, transparent 1px),
        #fbfaf5;
      background-size: 32px 32px;
      color: #0d0d0d;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 42px;
      border: 6px solid #191919;
      pointer-events: none;
    }

    .card::after {
      content: "";
      position: absolute;
      right: 66px;
      top: 64px;
      width: 192px;
      height: 192px;
      border: 6px solid #191919;
      background:
        linear-gradient(135deg, #c8ff2e 0 24%, #ffb000 24% 48%, #ff4f32 48% 72%, #31d8ff 72%);
      box-shadow: 14px 14px 0 #191919;
    }

    .content {
      position: relative;
      z-index: 1;
      height: 100%;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: 78px;
    }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 28px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 18px;
    }

    .mark {
      width: 76px;
      height: 76px;
      display: grid;
      place-items: center;
      border: 5px solid #191919;
      background:
        linear-gradient(90deg, #c8ff2e 0 25%, #ffb000 25% 50%, #ff4f32 50% 75%, #31d8ff 75%);
      box-shadow: 8px 8px 0 #c8ff2e;
      font-size: 26px;
      font-weight: 950;
      letter-spacing: -1px;
    }

    .brand strong {
      display: block;
      font-size: 32px;
      font-weight: 950;
      letter-spacing: -1px;
      text-transform: uppercase;
    }

    .brand span {
      display: block;
      margin-top: 4px;
      color: #686761;
      font-size: 16px;
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .label {
      min-height: 46px;
      display: inline-flex;
      align-items: center;
      border: 4px solid #191919;
      background: #ffffff;
      padding: 0 18px;
      box-shadow: 6px 6px 0 #c8ff2e;
      font-size: 18px;
      font-weight: 950;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .quote-wrap {
      display: grid;
      align-content: center;
      max-width: 880px;
      padding-top: 34px;
    }

    .quote-mark {
      width: max-content;
      margin-bottom: 26px;
      border: 5px solid #191919;
      background: #ffb000;
      padding: 10px 22px;
      box-shadow: 8px 8px 0 #191919;
      font-size: 48px;
      font-weight: 950;
      line-height: 1;
    }

    h1 {
      margin: 0;
      max-width: 900px;
      font-size: 83px;
      line-height: .92;
      letter-spacing: -3px;
      text-transform: uppercase;
    }

    h1 span {
      color: #ff4f32;
      text-shadow:
        3px 0 #191919,
        -3px 0 #191919,
        0 3px #191919,
        0 -3px #191919;
    }

    .bottom {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 24px;
    }

    .footer-line {
      max-width: 560px;
      border-left: 8px solid #31d8ff;
      padding-left: 18px;
      color: #686761;
      font-size: 26px;
      line-height: 1.22;
      font-weight: 900;
    }

    .url {
      min-height: 54px;
      display: inline-flex;
      align-items: center;
      border: 4px solid #191919;
      background: #0d0d0d;
      color: #fbfaf5;
      padding: 0 20px;
      font-size: 21px;
      font-weight: 950;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <main class="card" aria-label="OWNYOURWEB premium pricing quote">
    <section class="content">
      <div class="top">
        <div class="brand">
          <div class="mark">OW</div>
          <div>
            <strong>OWNYOURWEB</strong>
            <span>Premium web presence</span>
          </div>
        </div>
        <div class="label">Price The Value</div>
      </div>

      <div class="quote-wrap">
        <div class="quote-mark">"</div>
        <h1>Cheap websites cost more when nobody takes the business <span>seriously.</span></h1>
      </div>

      <div class="bottom">
        <div class="footer-line">Your website should build trust before the first conversation.</div>
        <div class="url">ownyourweb.xyz</div>
      </div>
    </section>
  </main>
</body>
</html>
