name: Sync Agent Store Queue

on:
  workflow_dispatch:
  schedule:
    - cron: '*/10 * * * *'

permissions:
  contents: write

jobs:
  sync-queue:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Pull latest requests from Supabase
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OWNYOURWEB_SUPABASE_URL: https://zkyhhoxcrjkhywblzehr.supabase.co
        run: npm run sync:queue-and-trackers

      - name: Commit queue and client tracker updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add agent-store/admin-queue.json client-trackers
          git diff --cached --quiet && exit 0
          git commit -m "Sync agent-store queue and client trackers"
          git push
